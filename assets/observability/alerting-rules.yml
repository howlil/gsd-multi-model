groups:
  - name: node-app-alerts
    rules:
      # High Error Rate - more than 5% of requests result in 5xx errors
      - alert: HighErrorRate
        expr: rate(ez_http_requests_total{status_code=~"5.."}[5m]) / rate(ez_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # High Latency - P95 latency above 1 second
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(ez_http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is {{ $value }}s (threshold: 1s)"

      # Service Down - application is not responding
      - alert: ServiceDown
        expr: up{job="nodeapp"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "{{ $labels.instance }} has been down for more than 1 minute"

      # High Memory Usage - Node.js heap usage above 90%
      - alert: HighMemoryUsage
        expr: nodejs_heap_size_used_bytes / nodejs_heap_size_total_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value | humanizePercentage }} (threshold: 90%)"

      # High Event Loop Lag - event loop lag above 100ms
      - alert: HighEventLoopLag
        expr: rate(nodejs_eventloop_lag_seconds_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High event loop lag detected"
          description: "Event loop lag is {{ $value | humanizeDuration }} (threshold: 100ms)"

      # High Active Connections - too many active connections
      - alert: HighActiveConnections
        expr: ez_active_connections{type="http"} > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of active connections"
          description: "Active HTTP connections: {{ $value }} (threshold: 1000)"

      # Low Request Rate - unusual drop in traffic
      - alert: LowRequestRate
        expr: rate(ez_http_requests_total[5m]) < 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Unusually low request rate"
          description: "Request rate is {{ $value }} req/s (threshold: 1 req/s)"
