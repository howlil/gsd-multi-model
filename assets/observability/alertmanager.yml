global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/XXX/YYY/ZZZ'

# Templates for alert messages
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Inhibition rules - prevent alert storms
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# Routing tree
route:
  receiver: 'slack-notifications'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts go to PagerDuty and Opsgenie
    - match:
        severity: 'critical'
      receiver: 'pagerduty-critical'
      continue: true
    - match:
        severity: 'critical'
      receiver: 'opsgenie-critical'
    # Platform team alerts
    - match:
        team: 'platform'
      receiver: 'platform-slack'

# Receivers
receivers:
  # Slack notifications for all alerts
  - name: 'slack-notifications'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        icon_emoji: ':warning:'

  # PagerDuty for critical alerts
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        severity: 'critical'
        description: '{{ template "pagerduty.description" . }}'
        details:
          alertname: '{{ .GroupLabels.alertname }}'
          severity: '{{ .GroupLabels.severity }}'
          description: '{{ .CommonAnnotations.description }}'

  # Opsgenie for critical alerts
  - name: 'opsgenie-critical'
    opsgenie_configs:
      - api_key: 'YOUR_OPSGENIE_API_KEY'
        teams:
          - name: 'platform-team'
        priority: 'P1'
        description: '{{ template "opsgenie.description" . }}'
        details:
          alertname: '{{ .GroupLabels.alertname }}'
          severity: '{{ .GroupLabels.severity }}'

  # Platform team Slack channel
  - name: 'platform-slack'
    slack_configs:
      - channel: '#platform-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}*Alert:* {{ .Annotations.summary }}\n*Description:* {{ .Annotations.description }}\n{{ end }}'

# Default templates
# Note: In production, create custom templates in /etc/alertmanager/templates/
