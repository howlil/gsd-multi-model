name: Deploy API Docs to GitHub Pages

on:
  push:
    tags:
      - 'v*'  # Auto-deploy on version tags (v5.0.0, v5.1.0, etc.)
  workflow_dispatch:  # Manual trigger from GitHub Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for all tags and branches

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Generate TypeDoc API Documentation
        run: npm run docs:api
        env:
          NODE_ENV: production

      - name: Verify Documentation
        run: |
          echo "Checking generated documentation..."
          ls -la docs/api/
          test -f docs/api/index.html && echo "✅ index.html found" || echo "❌ index.html not found"
          test -f docs/api/assets/js/main.js && echo "✅ main.js found" || echo "❌ main.js not found"
          test -f docs/api/assets/css/main.css && echo "✅ main.css found" || echo "❌ main.css not found"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/api'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Complete"
          echo ""
          echo "**API Documentation URL:** ${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "**Tag:** ${GITHUB_REF_NAME:-manual}"
          echo "**Commit:** ${GITHUB_SHA:0:7}"
          echo "**Time:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

  post-deploy:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Post Deployment Status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **Deployment Successful!**"
            echo ""
            echo "Your API documentation is now live at:"
            echo "📄 ${{ needs.build.outputs.page_url }}"
            echo ""
            echo "Next steps:"
            echo "1. Update README.md with the new API docs link"
            echo "2. Announce the release in your changelog"
            echo "3. Share with your team/users"
          else
            echo "❌ **Deployment Failed**"
            echo ""
            echo "Check the build logs for details:"
            echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            exit 1
          fi
