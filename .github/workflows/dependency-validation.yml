name: Dependency Validation

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (clean install)
        run: npm ci

      - name: Validate lockfile integrity
        run: |
          # Check if package-lock.json is valid JSON
          node -e "JSON.parse(require('fs').readFileSync('package-lock.json', 'utf8'))" || {
            echo "::error::package-lock.json is not valid JSON"
            exit 1
          }
          
          # Check lockfile version
          LOCKFILE_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package-lock.json', 'utf8')).lockfileVersion)")
          if [ "$LOCKFILE_VERSION" != "3" ]; then
            echo "::error::Lockfile version must be 3, got $LOCKFILE_VERSION"
            exit 1
          fi
          
          echo "✓ Lockfile is valid (v$LOCKFILE_VERSION)"

      - name: Check for lockfile changes
        if: github.event_name == 'pull_request'
        run: |
          # Get base branch name
          BASE_BRANCH="${{ github.base_ref }}"
          
          # Fetch base branch
          git fetch origin $BASE_BRANCH
          
          # Check if package-lock.json changed
          if git diff --name-only origin/$BASE_BRANCH...HEAD | grep -q "package-lock.json"; then
            echo "✓ package-lock.json has changes"
            
            # Show diff summary
            echo ""
            echo "Lockfile changes:"
            git diff origin/$BASE_BRANCH...HEAD -- package-lock.json | head -100
          else
            echo "✓ package-lock.json unchanged"
          fi

      - name: Verify reproducible install
        run: |
          # Remove node_modules and reinstall
          rm -rf node_modules
          npm ci
          
          # Generate hash of package-lock.json
          HASH1=$(sha256sum package-lock.json | cut -d' ' -f1)
          
          # Remove and reinstall again
          rm -rf node_modules
          npm ci
          
          # Generate hash again
          HASH2=$(sha256sum package-lock.json | cut -d' ' -f1)
          
          # Compare hashes
          if [ "$HASH1" != "$HASH2" ]; then
            echo "::error::Non-reproducible install detected"
            echo "Hash 1: $HASH1"
            echo "Hash 2: $HASH2"
            exit 1
          fi
          
          echo "✓ Reproducible install verified"

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Post PR comment with dependency info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            
            try {
              // Get dependency changes
              const BASE_BRANCH = process.env.GITHUB_BASE_REF || 'main';
              
              // Count dependencies
              const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
              const depCount = Object.keys(pkg.dependencies || {}).length + 
                              Object.keys(pkg.devDependencies || {}).length;
              
              let comment = '## Dependency Validation ✅\n\n';
              comment += `**Total dependencies:** ${depCount}\n`;
              comment += `**Lockfile version:** 3\n`;
              comment += `**Reproducible install:** Verified\n\n`;
              comment += '---\n\n';
              comment += '**Validation checks:**\n';
              comment += '- ✅ Lockfile integrity\n';
              comment += '- ✅ Reproducible install\n';
              comment += '- ✅ Build succeeds\n';
              comment += '- ✅ Tests pass\n';
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            } catch (error) {
              console.error('Failed to post PR comment:', error);
            }
