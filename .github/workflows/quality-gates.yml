name: Quality Gates

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build hooks
        run: npm run build:hooks

      - name: Run Quality Gates
        run: node ez-agents/bin/lib/gate-executor.cjs --ci --cache --timeout=30000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post PR Comment on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            try {
              const resultsPath = path.join(process.cwd(), 'gate-results.json');
              if (fs.existsSync(resultsPath)) {
                const gateResults = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
                
                let comment = '## Quality Gate Results ';
                const failedGates = gateResults.filter(r => !r.passed);
                comment += failedGates.length > 0 ? '❌' : '✅';
                comment += '\n\n';
                
                comment += '| Gate | Status | Errors |\n';
                comment += '|------|--------|--------|\n';
                
                gateResults.forEach(result => {
                  const status = result.passed ? '✅' : '❌';
                  comment += `| ${result.name} | ${status} | ${result.errors?.length || 0} |\n`;
                });
                
                if (failedGates.length > 0) {
                  comment += '\n<details>\n<summary>Error Details</summary>\n\n';
                  
                  failedGates.forEach(gate => {
                    comment += `### ${gate.name} Errors\n\n`;
                    gate.errors?.forEach((error, i) => {
                      comment += `${i + 1}. ${error}\n`;
                    });
                    comment += '\n';
                  });
                  
                  comment += '</details>\n';
                }
                
                comment += '\n---\n\n';
                comment += '**Bypass this check:**\n';
                comment += '```bash\n';
                comment += "git commit -m \"feat: add feature --bypass 'your justification here (min 10 chars)'\"\n";
                comment += '```\n';
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: comment
                });
              }
            } catch (error) {
              console.error('Failed to post PR comment:', error);
            }
