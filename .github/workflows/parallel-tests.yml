name: Parallel Execution Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  parallel-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run multi-agent coordination tests
        run: npx vitest run tests/integration/multi-agent-coordination.test.ts

      - name: Run state sync integration tests
        run: npx vitest run tests/integration/state-sync-integration.test.ts

      - name: Run conflict detection integration tests
        run: npx vitest run tests/integration/conflict-detection-integration.test.ts

      - name: Run parallel execution tests
        run: npx vitest run tests/integration/parallel-execution.test.ts

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

  parallel-performance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run performance benchmarks
        run: npx vitest run tests/perf/parallel-execution-perf.test.ts

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results
          path: perf-results/

  parallel-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E parallel workflow tests
        run: npx vitest run tests/e2e/parallel-workflow.test.ts

  parallel-tests-summary:
    runs-on: ubuntu-latest
    needs: [parallel-integration-tests, parallel-performance-tests, parallel-e2e-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.parallel-integration-tests.result }}" != "success" ] ||
             [ "${{ needs.parallel-performance-tests.result }}" != "success" ] ||
             [ "${{ needs.parallel-e2e-tests.result }}" != "success" ]; then
            echo "Parallel tests failed!"
            exit 1
          fi
          echo "All parallel tests passed!"
