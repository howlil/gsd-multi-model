name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || echo "No lint script configured - skipping"

      - name: Test
        run: npm test

      - name: Security audit
        id: audit
        run: |
          echo "::group::Running npm audit"
          npm audit --audit-level=moderate --json > audit-results.json || true
          echo "::endgroup::"
          
          # Display summary
          if [ -f audit-results.json ]; then
            echo "Audit results saved to artifact"
          fi
        continue-on-error: true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-results-${{ matrix.os }}-node${{ matrix.node-version }}
          path: audit-results.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Build hooks
        run: npm run build:hooks

      - name: Verify build
        run: |
          echo "Build verification complete"
          ls -la hooks/dist/ 2>/dev/null || echo "No hooks/dist directory"
